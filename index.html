<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>번호 뽑기</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1120;
      color: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      background: radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 30%),
                  linear-gradient(180deg, #0f172a 0%, #020617 100%);
    }

    .card {
      width: min(100%, 720px);
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 3vw, 2.75rem);
    }

    p {
      margin: 0 0 1.5rem;
      color: #cbd5e1;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 1.5rem;
    }

    label {
      display: grid;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: #e2e8f0;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 0.85rem;
      border: 1px solid rgba(148, 163, 184, 0.24);
      padding: 0.85rem 1rem;
      background: rgba(15, 23, 42, 0.95);
      color: #eef2ff;
      font-size: 1rem;
    }

    input[type="number"] {
      appearance: textfield;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
    }

    button {
      border: 1px solid rgba(96, 165, 250, 0.4);
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(59, 130, 246, 0.14));
      color: #f8fafc;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.28), rgba(59, 130, 246, 0.2));
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .results {
      min-height: 140px;
      padding: 1.5rem;
      background: rgba(15, 23, 42, 0.84);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 1rem;
      display: grid;
      gap: 1rem;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3.2rem;
      height: 3.2rem;
      padding: 0 0.75rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.16);
      color: #dbeafe;
      font-size: 1.05rem;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.18);
    }

    .footer {
      font-size: 0.92rem;
      color: #94a3b8;
    }

    .note {
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .small {
      font-size: 0.88rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>번호 뽑기</h1>
    <p>원하는 범위와 개수를 설정한 뒤 번호를 뽑아보세요. 중복 허용과 정렬 옵션도 함께 제공합니다.</p>

    <div class="grid">
      <label>
        시작 번호
        <input id="minInput" type="number" min="0" value="1" />
      </label>
      <label>
        끝 번호
        <input id="maxInput" type="number" min="1" value="45" />
      </label>
      <label>
        뽑을 개수
        <input id="countInput" type="number" min="1" value="6" />
      </label>
      <label>
        옵션
        <select id="modeSelect">
          <option value="unique" selected>중복 없이</option>
          <option value="duplicate">중복 허용</option>
        </select>
      </label>
    </div>

    <div class="button-row">
      <button id="drawBtn" type="button">번호 뽑기</button>
      <button id="resetBtn" type="button">초기화</button>
      <button id="saveBtn" type="button">설정 저장</button>
    </div>

    <div class="results">
      <div class="chip-list" id="resultList"></div>
      <div class="note" id="message">번호가 여기에 표시됩니다.</div>
    </div>

    <p class="footer">* 저장된 설정은 브라우저 로컬 저장소에 보관됩니다. 같은 브라우저에서 다시 열면 이전 설정이 유지됩니다.</p>
  </section>

  <script>
    const minInput = document.getElementById('minInput');
    const maxInput = document.getElementById('maxInput');
    const countInput = document.getElementById('countInput');
    const modeSelect = document.getElementById('modeSelect');
    const drawBtn = document.getElementById('drawBtn');
    const resetBtn = document.getElementById('resetBtn');
    const saveBtn = document.getElementById('saveBtn');
    const resultList = document.getElementById('resultList');
    const message = document.getElementById('message');
    const STORAGE_KEY = 'number-picker-settings-v1';

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function validateSettings(min, max, count, mode) {
      if (Number.isNaN(min) || Number.isNaN(max) || Number.isNaN(count)) {
        return '값을 모두 올바르게 입력해주세요.';
      }
      if (min > max) return '시작 번호는 끝 번호보다 작거나 같아야 합니다.';
      if (count < 1) return '뽑을 개수는 1개 이상이어야 합니다.';
      if (mode === 'unique' && count > max - min + 1) {
        return '중복 없이 뽑으려면 범위가 충분히 넓어야 합니다.';
      }
      return null;
    }

    function drawNumbers() {
      const min = parseInt(minInput.value, 10);
      const max = parseInt(maxInput.value, 10);
      const count = parseInt(countInput.value, 10);
      const mode = modeSelect.value;

      const error = validateSettings(min, max, count, mode);
      if (error) {
        renderMessage(error);
        return;
      }

      const picks = [];
      if (mode === 'unique') {
        const pool = [];
        for (let i = min; i <= max; i += 1) pool.push(i);
        for (let i = 0; i < count; i += 1) {
          const index = randomInt(0, pool.length - 1);
          picks.push(pool.splice(index, 1)[0]);
        }
      } else {
        for (let i = 0; i < count; i += 1) {
          picks.push(randomInt(min, max));
        }
      }

      picks.sort((a, b) => a - b);
      renderResults(picks);
      renderMessage(`총 ${picks.length}개의 번호를 뽑았습니다.`);
    }

    function renderResults(numbers) {
      resultList.innerHTML = '';
      numbers.forEach((value) => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = value;
        resultList.appendChild(chip);
      });
    }

    function renderMessage(text) {
      message.textContent = text;
    }

    function resetSettings() {
      minInput.value = 1;
      maxInput.value = 45;
      countInput.value = 6;
      modeSelect.value = 'unique';
      resultList.innerHTML = '';
      renderMessage('번호가 여기에 표시됩니다.');
    }

    function saveSettings() {
      const settings = {
        min: minInput.value,
        max: maxInput.value,
        count: countInput.value,
        mode: modeSelect.value,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      renderMessage('설정이 저장되었습니다.');
    }

    function loadSettings() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const settings = JSON.parse(saved);
        minInput.value = settings.min ?? 1;
        maxInput.value = settings.max ?? 45;
        countInput.value = settings.count ?? 6;
        modeSelect.value = settings.mode ?? 'unique';
      } catch {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    drawBtn.addEventListener('click', drawNumbers);
    resetBtn.addEventListener('click', resetSettings);
    saveBtn.addEventListener('click', saveSettings);

    window.addEventListener('keydown', (event) => {
      if (event.ctrlKey && event.key.toLowerCase() === 'r') {
        event.preventDefault();
        drawNumbers();
      }
    });

    loadSettings();
  </script>
</body>
</html>
